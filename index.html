<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>강사별 DB보고서 · 운영 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"/>
  <link rel="stylesheet" href="./styles/main.css"/>
  <link rel="stylesheet" href="./styles/landing-dashboard.css"/>
</head>
<body data-page="landing-dashboard">
  <section id="landingLoginScreen" class="loginScreen">
    <div class="loginSimpleCard">
      <div class="loginSimpleBrand">
        <img src="./assets/classaround-logo.png" alt="ClassAround" class="brandLogoImg"/>
        <div>
          <div class="loginSimpleName">ClassAround</div>
          <div class="loginSimpleSub">Performance Dashboard</div>
        </div>
      </div>
      <div class="loginSimpleHead">
        <span class="loginKicker">운영 대시보드</span>
        <h1>로그인</h1>
        <p>등록된 계정으로 로그인하면 강사 랭킹 대시보드가 열려.</p>
      </div>
      <div class="loginSimpleForm">
        <label>
          <span>아이디</span>
          <input id="landingLoginId" type="text" placeholder="아이디" value="classaround" autocomplete="username"/>
        </label>
        <label>
          <span>비밀번호</span>
          <input id="landingLoginPw" type="password" placeholder="비밀번호" autocomplete="current-password"/>
        </label>
        <button id="landingLoginBtn" type="button" class="loginSubmitBtn">로그인</button>
      </div>
      <div id="landingLoginMsg" class="loginInlineError"></div>
    </div>
  </section>

  <div id="landingApp" class="portalShell" style="display:none">
    <aside class="portalSidebar">
      <div class="portalSidebarTop">
        <div class="portalBrand portalBrandWithImage">
          <img src="./assets/classaround-logo.png" alt="ClassAround" class="brandLogoImg sidebarBrandImg"/>
          <div>
            <div class="portalBrandName">ClassAround</div>
            <div class="portalBrandSub">Performance Dashboard</div>
          </div>
        </div>
      </div>

      <div class="portalSidebarSectionTitle">카테고리</div>
      <div class="portalSidebarGroup">
        <div class="portalSidebarSearchWrap" id="sidebarSearchWrap">
          <label class="portalFieldLabel" for="sidebarInstructorSearch">강사 검색</label>
          <input id="sidebarInstructorSearch" type="text" placeholder="강사명 검색"/>
        </div>
        <nav id="sidebarCategoryNav" class="portalNavTree categoryTree"></nav>
      </div>
    </aside>

    <main class="portalMain">
      <header class="portalTopbar compactTopbar topbarPanel">
        <div>
          <h1>부업 대시보드</h1>
        </div>
        <div class="portalTopbarRight">
          <div class="portalUserCard">
            <div class="portalUserAvatar">CA</div>
            <div>
              <div class="portalUserLabel">로그인 계정</div>
              <div class="portalUserValue" id="landingAuthStatus">미로그인</div>
            </div>
          </div>
          <button id="landingLogout" type="button" class="ghostBtn">로그아웃</button>
        </div>
      </header>

      <section class="portalPanel portalScopePanel">
        <div class="portalScopeHead">
          <div>
            <div class="portalSectionEyebrow">RANKING VIEW</div>
            <h2>랭킹 보기</h2>
          </div>
          <div class="portalScopeMode" id="scopeModeTabs">
            <button type="button" class="scopeModeBtn is-active" data-scope-mode="all">전체 랭킹</button>
            <button type="button" class="scopeModeBtn" data-scope-mode="category">카테고리 랭킹</button>
          </div>
        </div>
        <div class="portalScopeBody">
          <div class="portalScopeInfo">
            <span id="scopeSummaryLabel">전체 항목 기준 랭킹을 보고 있어.</span>
            <small>카테고리를 고르면 부동산 / 콘텐츠 / 이커머스 / 마케팅 기준으로 따로 볼 수 있어.</small>
          </div>
          <div id="scopeCategoryPills" class="scopeCategoryPills"></div>
        </div>
      </section>

      <section id="landingContent" class="portalContent tightened">
        <div class="portalUtilityRow compactUtility utilityNoSearch">
          <div class="portalChipRow" id="landingMetaChips">
            <span class="portalMetaChip">항목 <b id="landingInstructorCount">0</b></span>
            <span class="portalMetaChip">프로젝트 <b id="landingProjectCount">0</b></span>
            <span class="portalMetaChip">카테고리 <b id="landingCategoryCount">0</b></span>
          </div>
        </div>

        <section id="landingStatsGrid" class="portalStatsGrid compact slimCountGrid"></section>

        <section class="portalDashboardGrid simplifiedDashboardGrid emphasisDashboardGrid">
          <div class="portalMainColumn">
            <article class="portalPanel portalRankingPanel compactPanel emphasisRankingPanel">
              <div class="portalSectionHead compact rankingHeadBar">
                <div>
                  <div class="portalSectionEyebrow">RANKING</div>
                  <h3>강사 · 아이템 랭킹</h3>
                </div>
                <div class="rankingControlGroup">
                  <label class="inlineField">
                    <span>정렬 기준</span>
                    <select id="landingSortMetric">
                      <option value="roas">ROAS</option>
                      <option value="spend">광고비</option>
                      <option value="revenue">실매출</option>
                      <option value="projects">프로젝트 수</option>
                      <option value="name">가나다순</option>
                    </select>
                  </label>
                  <label class="inlineField">
                    <span>순서</span>
                    <select id="landingSortOrder">
                      <option value="desc">내림차순</option>
                      <option value="asc">오름차순</option>
                    </select>
                  </label>
                </div>
              </div>
              <div id="landingRankingTableWrap"></div>
            </article>
          </div>

          <div class="portalSideColumn narrowerSideColumn">
            <article class="portalPanel portalSpotlightPanel compactPanel">
              <div class="portalSectionHead compact spotlightHeadCompact">
                <div>
                  <div class="portalSectionEyebrow">SPOTLIGHT</div>
                  <h3>선택 항목</h3>
                </div>
                <button id="spotlightOpenBtn" type="button" class="primaryBtn">강사 페이지 열기</button>
              </div>
              <div id="landingSpotlight"></div>
            </article>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="./js/landing.js"></script>
</body>
</html>
